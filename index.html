<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zwigato | Food Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fa-solid fa-utensils"></i> Zwigato</a>
            <div class="search-container">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search for restaurants, cuisine...">
            </div>
            <div class="nav-actions">
                <button id="themeToggle" class="icon-btn"><i class="fa-solid fa-moon"></i></button>
                <button id="cartToggle" class="cart-btn">
                    <i class="fa-solid fa-shopping-cart"></i>
                    <span id="cartCount" class="badge">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="banner">
            <div class="banner-content">
                <h1>Hungry? You're in the right place</h1>
                <p>Order food from favourite restaurants near you.</p>
            </div>
        </section>

        <section class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="Pizza">Pizza</button>
            <button class="filter-btn" data-filter="Burger">Burgers</button>
            <button class="filter-btn" data-filter="Asian">Asian</button>
            <button class="filter-btn" data-filter="Healthy">Healthy</button>
        </section>

        <section class="restaurants">
            <h2>Top Restaurants</h2>
            <div id="restaurantGrid" class="restaurant-grid">
                <!-- Dynamically populated -->
            </div>
        </section>
    </main>

    <!-- Cart Drawer -->
    <div id="cartDrawer" class="cart-drawer">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button id="closeCart" class="icon-btn"><i class="fa-solid fa-times"></i></button>
        </div>
        <div id="cartItems" class="cart-items">
            <!-- Dynamically populated -->
        </div>
        <div class="cart-footer">
            <div class="cart-totals">
                <span>Subtotal:</span>
                <span id="cartSubtotal">₹0.00</span>
            </div>
            <a href="checkout.html" class="btn-primary checkout-btn" id="goToCheckoutBtn">Proceed to Checkout</a>
        </div>
    </div>
    <div id="cartOverlay" class="cart-overlay"></div>

    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
