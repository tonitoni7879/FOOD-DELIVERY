<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Zwigato</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fa-solid fa-utensils"></i> Zwigato</a>
            <div class="nav-actions">
                <button id="themeToggle" class="icon-btn"><i class="fa-solid fa-moon"></i></button>
            </div>
        </div>
    </header>

    <main class="container checkout-layout">
        <section class="checkout-form">
            <h2>Delivery Details</h2>
            <form id="checkoutForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" required placeholder="+91 98765 43210">
                </div>
                <div class="form-group">
                    <label>Delivery Address</label>
                    <textarea required rows="3" placeholder="123 Street Name, City"></textarea>
                </div>
                <h2>Payment Method</h2>
                <div class="payment-methods">
                    <label class="payment-option">
                        <input type="radio" name="payment" value="card" checked>
                        <span>Credit/Debit Card</span>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment" value="upi">
                        <span>UPI</span>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment" value="cod">
                        <span>Cash on Delivery</span>
                    </label>
                </div>
                <button type="submit" class="btn-primary w-100 mt-2">Place Order</button>
            </form>
        </section>

        <aside class="checkout-summary">
            <h2>Order Summary</h2>
            <div id="checkoutItems" class="checkout-items-list"></div>
            <div class="receipt">
                <div class="receipt-row">
                    <span>Subtotal</span>
                    <span id="chkSubtotal">₹0.00</span>
                </div>
                <div class="receipt-row">
                    <span>Delivery Fee</span>
                    <span id="chkDelivery">₹40.00</span>
                </div>
                <div class="receipt-row total">
                    <span>Total</span>
                    <span id="chkTotal">₹0.00</span>
                </div>
            </div>
        </aside>
    </main>

    <!-- Success Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="success-animation">
                <i class="fa-solid fa-check-circle"></i>
            </div>
            <h2>Order Placed Successfully!</h2>
            <p>Your food is being prepared.</p>
            <button onclick="window.location.href='index.html'" class="btn-primary">Back to Home</button>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
